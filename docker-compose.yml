services:
  postgres:
    image: postgres:16
    container_name: moparscape-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RSPS_POSTGRES_DB:-moparscape}
      POSTGRES_USER: ${RSPS_POSTGRES_USER:-moparscape}
      POSTGRES_PASSWORD: ${RSPS_POSTGRES_PASSWORD:-moparscape}
    ports:
      - "${RSPS_POSTGRES_PORT:-55432}:5432"
    volumes:
      - moparscape-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${RSPS_POSTGRES_USER:-moparscape} -d ${RSPS_POSTGRES_DB:-moparscape}
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  moparscape-postgres-data:
