services:
  postgres:
    image: postgres:16
    container_name: moparscape-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RSPS_POSTGRES_DB:-moparscape}
      POSTGRES_USER: ${RSPS_POSTGRES_USER:-moparscape}
      POSTGRES_PASSWORD: ${RSPS_POSTGRES_PASSWORD:-moparscape}
    ports:
      - "${RSPS_POSTGRES_PORT:-55432}:5432"
    volumes:
      - moparscape-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${RSPS_POSTGRES_USER:-moparscape} -d ${RSPS_POSTGRES_DB:-moparscape}
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-init:
    build:
      context: .
      dockerfile: rs-persistence-sql/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RSPS_DB_JDBC_URL: jdbc:postgresql://postgres:5432/${RSPS_POSTGRES_DB:-moparscape}
      RSPS_DB_USERNAME: ${RSPS_POSTGRES_USER:-moparscape}
      RSPS_DB_PASSWORD: ${RSPS_POSTGRES_PASSWORD:-moparscape}
    command: ["migrate"]
    restart: "no"

volumes:
  moparscape-postgres-data:
